name: Visual Regression Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  visual-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required for selective testing

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22


      - name: Install dependencies
        run: npm install

      - name: UVT Environment Diagnostic
        run: |
          echo "=== UVT Environment ==="
          echo "Package Manager : npm"
          echo "Workspace       : No"
          echo "Framework       : SvelteKit"
          echo "Project Type    : Hybrid"
          echo "Server Model    : SSR"
          echo "Node            : $(node -v)"
          if [ -n "$PERCY_TOKEN" ]; then
            echo "PERCY_TOKEN: Present (length: ${#PERCY_TOKEN})"
          else
            echo "PERCY_TOKEN: Not Present"
          fi
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Cache Percy Browser
        uses: actions/cache@v4
        with:
          path: ~/.local/share/percy
          key: ${{ runner.os }}-percy-${{ hashFiles('**/package-lock.json') }}

      - name: Build frontend application
        run: npm run build --if-present

      - name: Start dev server in background
        run: npm run dev &

      - name: Wait for local server
        run: |
          for i in {1..30}; do
            curl -s http://localhost:5173 && break || sleep 1
          done

      - name: Run visual regression tests
        run: npx uvt test --changed --port 5173
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

      - name: Teardown background processes
        if: always()
        run: pkill -f "node" || true
